<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Surprise for Nikki!</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        body { 
            text-align: center; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: #1a1a1a; 
            color: white;
            margin: 0;
            padding: 20px;
            overflow-x: hidden;
            position: relative;
        }
        
        .background-icons {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            z-index: 0;
        }
        .icon {
            position: absolute;
            font-size: 24px;
            animation: floatUp 15s linear infinite;
            opacity: 0.3;
        }
        @keyframes floatUp {
            from { transform: translateY(110vh) rotate(0deg); }
            to { transform: translateY(-10vh) rotate(360deg); }
        }

        #content-wrapper { position: relative; z-index: 10; }
        h2 { margin-top: 0; color: #FFD700; text-shadow: 2px 2px 4px rgba(0,0,0,0.8); }
        
        #container { 
            position: relative; 
            width: 85vw; 
            max-width: 400px; 
            aspect-ratio: 1 / 1;
            margin: 10px auto; 
            cursor: crosshair;
            border: 5px solid #FFD700;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0,0,0,1);
            background: #333;
        }
        canvas { 
            position: absolute; 
            top: 0; left: 0; 
            border-radius: 10px;
            z-index: 5;
            touch-action: none;
        }
        #under-image { 
            width: 100%; height: 100%; 
            object-fit: cover; 
            border-radius: 10px;
            z-index: 1;
        }
        
        .revealed-area {
            margin-top: 20px;
            display: none; 
            animation: fadeInMessage 2s ease-out;
            padding: 0 15px;
        }
        .birthday-message {
            background: rgba(255, 215, 0, 0.1);
            border: 2px solid #FFD700;
            padding: 20px;
            border-radius: 15px;
            font-size: 1.1em;
            line-height: 1.6;
            color: #FFD700;
            margin-bottom: 20px;
            box-shadow: 0 0 15px rgba(255, 215, 0, 0.3);
        }
        .download-btn {
            background: #FFD700;
            color: #1a1a1a;
            border: none;
            padding: 12px 25px;
            font-weight: bold;
            border-radius: 25px;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
            margin: 5px;
            font-size: 14px;
        }
        @keyframes fadeInMessage { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div class="background-icons" id="bg-icons"></div>

    <div id="content-wrapper">
        <h2 id="title">Scratch to reveal your 40th surprise, Nikki! ✨</h2>
        <div id="container">
            <img id="under-image" src="https://i.ibb.co/FkRV2VTk/782-F89-CA-FBC0-4-D94-A084-4-B6-FD11-E5387.png">
            <canvas id="scratch-canvas"></canvas>
        </div>

        <div class="revealed-area" id="reveal-area">
            <div class="birthday-message">
                To Nikki,<br><br>
                Welcome to the 40 club, its about time you arrived! Happy Birthday, can't wait to celebrate with you,<br><br>
                love you loads,<br><br>
                Chris & all of the other Birthday Bitches! xXx
            </div>
            <a class="download-btn" href="https://www.dropbox.com/scl/fi/pjwws1lb3uyw85c797qvn/We-re-the-Birthday-Bitches-The-40-Club-Remix.mp3?rlkey=cnq7hx5hkfjltrp8mvyp396u1&st=wj9975wn&raw=1" download="Nikki-Birthday-Remix.mp3">Download Song ⬇️</a>
        </div>
    </div>

    <audio id="birthday-song" src="https://www.dropbox.com/scl/fi/pjwws1lb3uyw85c797qvn/We-re-the-Birthday-Bitches-The-40-Club-Remix.mp3?rlkey=cnq7hx5hkfjltrp8mvyp396u1&st=wj9975wn&raw=1" loop></audio>

    <script>
        const canvas = document.getElementById('scratch-canvas');
        const ctx = canvas.getContext('2d');
        const container = document.getElementById('container');
        const audio = document.getElementById('birthday-song');
        const bgIcons = document.getElementById('bg-icons');
        let hasWon = false;
        let scratchCount = 0;

        const icons = ['🎉', '🎂', '🎈', '💖', '✨', '🎁'];
        for (let i = 0; i < 20; i++) {
            const icon = document.createElement('div');
            icon.classList.add('icon');
            icon.innerText = icons[Math.floor(Math.random() * icons.length)];
            icon.style.left = Math.random() * 100 + 'vw';
            icon.style.animationDelay = Math.random() * 15 + 's';
            icon.style.fontSize = Math.random() * (30 - 16) + 16 + 'px';
            bgIcons.appendChild(icon);
        }

        function resize() {
            canvas.width = container.offsetWidth;
            canvas.height = container.offsetHeight;
            ctx.fillStyle = '#FFD700'; 
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.globalCompositeOperation = 'destination-out';
        }
        window.addEventListener('resize', resize);
        resize();

        function scratch(e) {
            const rect = canvas.getBoundingClientRect();
            const x = (e.clientX || (e.touches && e.touches[0].clientX)) - rect.left;
            const y = (e.clientY || (e.touches && e.touches[0].clientY)) - rect.top;
            
            ctx.beginPath();
            ctx.arc(x, y, 35, 0, Math.PI * 2);
            ctx.fill();
            
            if (audio.paused) {
                audio.play().catch(() => {});
            }

            scratchCount++;
            if (scratchCount > 100 && !hasWon) {
                hasWon = true;
                confetti({
                    particleCount: 200,
                    spread: 80,
                    origin: { y: 0.6 },
                    colors: ['#FFD700', '#ffffff', '#FF1493']
                });
                canvas.style.transition = "opacity 2s";
                canvas.style.opacity = "0";
                setTimeout(() => {
                    document.getElementById('reveal-area').style.display = 'block';
                    document.getElementById('title').style.display = 'none';
                    window.scrollBy({ top: 150, left: 0, behavior: 'smooth' });
                }, 1500);
            }
        }

        canvas.addEventListener('mousemove', (e) => { if(e.buttons == 1) scratch(e); });
        canvas.addEventListener('mousedown', scratch);
        canvas.addEventListener('touchstart', (e) => { scratch(e); });
        canvas.addEventListener('touchmove', (e) => { e.preventDefault(); scratch(e); }, {passive: false});
    </script>
</body>
</html>
